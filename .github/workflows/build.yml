name: Build

on:
  push:
  pull_request:

jobs:
  ubuntu-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsdl2-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Smoke test
        run: SDL_VIDEODRIVER=dummy ./build/caesar2 --smoke-test
